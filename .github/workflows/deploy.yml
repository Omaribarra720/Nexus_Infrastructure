name: Deploy Stack to Swarm

on:
  push:
    branches:
      - main
    paths:
      - stack.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy stack.yml to EC2 Manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_SSH_HOST }}
          username: ${{ secrets.AWS_SSH_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          source: "stack.yml"
          target: "/home/${{ secrets.AWS_SSH_USER }}/nexus-app/"

      - name: Deploy Stack via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_SSH_HOST }}
          username: ${{ secrets.AWS_SSH_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: MONGO_URI,DOCKER_USER
          script: |
            mkdir -p /home/ec2-user/nexus-app/
            cd /home/ec2-user/nexus-app/
            export MONGO_URI="$MONGO_URI"
            export DOCKER_USER="$DOCKER_USER"
            docker stack deploy -c stack.yml nexus_app --with-registry-auth
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
